[defaults]

# Use the lab inventory file in this repo by default.
inventory = ./inventory/lab.yml

# Default SSH user for the Linux lab VM.
remote_user = vagrant

# Skip SSH host key prompts to reduce friction in a disposable lab.
host_key_checking = False

# Do not generate *.retry files after failed runs.
retry_files_enabled = False

# Show playbook output in a more readable YAML-style format.
stdout_callback = ansible.builtin.default
result_format = yaml

# Auto-detect the remote Python interpreter without extra warning noise.
interpreter_python = auto_silent

vault_password_file = .vault_pass

[privilege_escalation]

# Run privileged tasks with become by default.
become = True

# Use sudo for privilege escalation on Linux hosts.
become_method = sudo

# Do not prompt for a sudo password; assumes passwordless sudo is already in place.
become_ask_pass = False


